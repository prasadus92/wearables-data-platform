name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: timescale/timescaledb:latest-pg16
        env:
          POSTGRES_USER: youth
          POSTGRES_PASSWORD: youth
          POSTGRES_DB: wearables
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U youth"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          uv venv
          uv pip install -e ".[dev]"

      - name: Lint (ruff)
        run: |
          .venv/bin/ruff check app tests
          .venv/bin/ruff format --check app tests

      - name: Tests
        run: .venv/bin/python -m pytest tests/ -v --cov=app --cov-report=term-missing
        env:
          DATABASE_URL: postgresql+asyncpg://youth:youth@localhost:5432/wearables_test
          REDIS_URL: redis://localhost:6379/1

      - name: Docker build
        run: docker build -t youth-wearables-backend .
