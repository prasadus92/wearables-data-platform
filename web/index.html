<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <meta

      content="Heart rate, sleep and recovery from your wearables, live on one timeline."
    />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta property="og:title" content="YOU(th) Wearables" />
    <meta
      property="og:description"
      content="Your body has a story. See it unfold. Heart rate, sleep and recovery from your wearables, live on one timeline."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://app.youth.luminik.io/" />
    <meta property="og:image" content="https://app.youth.luminik.io/og.png" />
    <meta property="og:image:width" content="1200" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="YOU(th) Wearables" />
    <meta
      name="twitter:description"
      content="Your body has a story. See it unfold. Heart rate, sleep and recovery from your wearables, live on one timeline."
    />
    <meta name="twitter:image" content="https://app.youth.luminik.io/og.png" />
    <meta name="theme-color" content="#F4F1EC" />
    <script>
      // Apply the saved (or system) theme before first paint so a reload
      // in dark mode never flashes the light background. ThemeProvider
      // takes over once React mounts.
      ;(function () {
        try {
          var t = localStorage.getItem('youth-wearables-theme')
          var dark =
            t === 'dark' ||
            (t !== 'light' && matchMedia('(prefers-color-scheme: dark)').matches)
          if (dark) document.documentElement.classList.add('dark')
        } catch (e) {
          /* first paint stays light; ThemeProvider corrects it on mount */
        }
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
